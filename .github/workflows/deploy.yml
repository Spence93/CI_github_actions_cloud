name: Dev Deploy to EC2

on:
  push:
    branches: [ development ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # "environment" must match the name of your GitHub environment
    environment: dev

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Copy app to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: "ec2-user"
          port: 22
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./codebases/message_server/Dockerfile, ./codebases/message_server/app.py, ./codebases/message_server/requirements.txt"
          target: ~/message-server-dev
          strip_components: 2

      - name: Build and run on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: "ec2-user"
          port: 22
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/message-server-dev
            docker build --pull -t message-server-dev:latest .
            docker stop message-server-dev || true
            docker rm message-server-dev || true
            docker image prune -f || true
            docker run -d \
              --name message-server-dev \
              --restart unless-stopped \
              -p 5003:5002 \
              -e APP_ENV=DOCKER_DEV \
              -e POSTGRES_USER='${{ secrets.POSTGRES_USER }}' \
              -e POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
              -e POSTGRES_HOST='${{ secrets.POSTGRES_HOST }}' \
              -e POSTGRES_DB='postgres' \
              message-server-dev:latest
